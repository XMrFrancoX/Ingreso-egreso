<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="https://www.philips.edu.ar/favicon.png" />
		<meta name="description" content="Sistema de Pasantías - Escuela Philips" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
		%sveltekit.head%
		<style>
			:root {
				--philips-blue: #0B5EAA;
				--philips-blue-dark: #084985;
				--philips-blue-light: #e8f0fb;
				--bs-primary: #0B5EAA;
				--bs-primary-rgb: 11, 94, 170;
				--bs-body-bg: #f0f4f9;
				--bs-body-font-family: 'Outfit', sans-serif;
			}
			body {
				font-family: var(--bs-body-font-family);
				background-color: var(--bs-body-bg);
				color: #1a1a2e;
			}
			.btn-primary {
				--bs-btn-bg: #0B5EAA;
				--bs-btn-border-color: #0B5EAA;
				--bs-btn-hover-bg: #084985;
				--bs-btn-hover-border-color: #084985;
			}
			.card {
				border: none;
				border-radius: 1rem;
				box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
			}
			.glass-card {
				background: rgba(255, 255, 255, 0.9);
				backdrop-filter: blur(12px);
				border: 1px solid rgba(255,255,255,0.5);
				border-radius: 1rem;
				box-shadow: 0 8px 32px rgba(11, 94, 170, 0.08);
			}
			.philips-text { color: #0B5EAA; }
			.badge { font-weight: 500; }
			.table > :not(caption) > * > * { padding: 0.85rem 0.75rem; }
			.form-control:focus, .form-select:focus {
				border-color: #0B5EAA;
				box-shadow: 0 0 0 0.2rem rgba(11,94,170,0.15);
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
